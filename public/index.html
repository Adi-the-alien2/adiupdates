<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brief News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="container">
          <h1 class="splash-title">AdiUpdates</h1>
          <p class="scroll-hint">Scroll down for your news feed</p>
        </div>
      </section>

      <section class="feed-section">
        <div class="container feed-container">
          <h2 class="feed-title">Latest Briefings</h2>
          <section id="news-list" class="news-list" aria-live="polite"></section>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
